name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Fetch private shareable branch
        if: github.ref_name == 'main' && github.event.repository.private
        run: git fetch origin shareable:refs/heads/shareable

      - name: Fetch shared automation resources
        run: git clone --depth 1 https://github.com/alexremington/automation-shared-resources-shareable.git ../automation-shared-resources

      - name: Run checks
        run: npm run check

      - name: Scan current public-safe tree
        if: github.ref_name == 'shareable' || !github.event.repository.private
        run: scripts/check-shareable.sh HEAD

  smoke-ui:
    name: UI smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run isolated UI smoke test
        run: npm run smoke:ui:local

  windows-portability:
    name: Windows portability
    runs-on: windows-2025-vs2026
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Fetch shared automation resources
        shell: pwsh
        run: git clone --depth 1 https://github.com/alexremington/automation-shared-resources-shareable.git ../automation-shared-resources

      - name: Run Windows portability checks
        shell: pwsh
        run: npm run check:windows
