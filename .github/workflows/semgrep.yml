name: Semgrep

on:
  push:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep security scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep CE scan
        run: semgrep scan --config p/default --exclude node_modules --exclude dist --exclude build --exclude coverage --exclude public/vendor --exclude .beads --exclude .worktrees --error --quiet
