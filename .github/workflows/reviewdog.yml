name: Reviewdog

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  semgrep-reviewdog:
    name: Semgrep review annotations
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Install Reviewdog
        run: go install github.com/reviewdog/reviewdog/cmd/reviewdog@v0.20.3

      - name: Run Semgrep with Reviewdog annotations
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -u
          semgrep_status=0
          semgrep scan --config p/default --exclude node_modules --exclude dist --exclude build --exclude coverage --exclude public/vendor --exclude .beads --exclude .worktrees --json --quiet > "$RUNNER_TEMP/semgrep.json" || semgrep_status=$?
          node scripts/semgrep-to-rdjson.mjs < "$RUNNER_TEMP/semgrep.json" | reviewdog -f=rdjson -name=semgrep -reporter=github-pr-review -filter-mode=added -level=warning
          if [ "$semgrep_status" -gt 1 ]; then
            exit "$semgrep_status"
          fi
